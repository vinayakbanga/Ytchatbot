<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            min-height: 200px;
            background: linear-gradient(135deg, #0f0f19 0%, #19192d 100%);
            color: #f3f4f6;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.5;
        }

        .status {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .status-text {
            font-size: 13px;
            color: #6ee7b7;
        }

        .instructions {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .instructions h2 {
            font-size: 14px;
            margin-bottom: 12px;
            color: #e0e7ff;
        }

        .instructions ol {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
            padding-left: 20px;
        }

        .instructions li {
            margin-bottom: 6px;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="icon">💬</div>
        <h1>Video Chat AI</h1>
        <p class="subtitle">Ask questions about any YouTube video</p>
    </div>

    <div class="status">
        <div class="status-dot"></div>
        <div class="status-text">Extension Active</div>
    </div>

    <div class="instructions">
        <h2>📖 How to Use</h2>
        <ol>
            <li>Open any YouTube video</li>
            <li>Click the chat button (💬) in the bottom-right</li>
            <li>Ask questions about the video content</li>
            <li>Get AI-powered answers instantly!</li>
        </ol>
    </div>

    <div class="footer">
        Made with ❤️ using AI
    </div>

    <script src="popup.js"></script>
</body>
</html>
